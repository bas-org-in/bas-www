<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="BAS blog posts and updates">
    <meta name="author" content="Bangalore Astronomical Society">
    <link rel="shortcut icon" href="/files/favicon.ico">

    <title>BAS Blogs</title>

    <script src="/assets/js/bas-theme.js"></script>
    <script src="/assets/js/bas-wp-posts.js" defer></script>
    <link rel="stylesheet" href="/assets/css/bas-site.css">
  </head>
  <body class="bas-page bas-page--wide">
    <!-- BAS_GLOBAL_NAV_START -->
    <nav class="bas-site-nav" aria-label="BAS site sections">
      <div class="bas-site-nav__inner">
        <a class="bas-site-nav__brand" href="/">Bangalore Astronomical Society</a>
        <div class="bas-site-nav__links">
          <a href="/">Home</a>
          <a href="/tools/">Tools</a>
          <a href="/policy/">Policy</a>
          <a href="/historic/">Historic</a>
          <a href="/pages/">Pages</a>
          <a href="/gallery/">Gallery</a>
          <a href="/blogs/" aria-current="page">Blogs</a>
        </div>
        <button class="bas-theme-toggle" type="button" data-bas-theme-toggle aria-label="Switch to dark mode" title="Switch to dark mode"><span class="bas-theme-toggle__icon" aria-hidden="true">&#9790;</span></button>
      </div>
    </nav>
    <!-- BAS_GLOBAL_NAV_END -->

    <main class="bas-page__main">
      <header class="bas-page-header">
        <h1>BAS Blogs</h1>
        <p>Posts and updates published through the BAS WordPress workflow.</p>
      </header>

      <section
        class="bas-wp-posts"
        data-bas-wp-post
        data-bas-wp-count="12"
        data-bas-wp-empty="No BAS posts are available yet.">
      </section>
    </main>
  </body>
</html>
